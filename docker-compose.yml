services:
  ai-server:
    image: 536181645646.dkr.ecr.ap-northeast-2.amazonaws.com/asn/ai-server:latest
    container_name: asn-ai-server
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - /tmp/ai-server:/tmp
    deploy:
      resources:
        limits:
          memory: 3.5G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s